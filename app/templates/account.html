{% extends "base.html" %}
{% block title %}Account - Face Attendance{% endblock %}
{% block content %}
<section class="card" style="max-width:420px;">
  <h2>Account Settings</h2>
  <p class="subtitle">Currently logged in as <b>{{ current_username }}</b></p>
  {% if error %}<div class="alert error">⚠️ {{ error }}</div>{% endif %}
  {% if success %}<div class="alert success">✅ {{ success }}</div>{% endif %}
  <form method="post">
    <div class="field"><label>New Username</label><input name="new_username" type="text" value="{{ current_username }}" required></div>
    <div class="field"><label>Confirm with Current Password</label><input name="current_password" type="password" required></div>
    <div class="controls"><button type="submit">Update Username</button></div>
  </form>
</section>
{% endblock %}
