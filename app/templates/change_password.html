{% extends "base.html" %}
{% block title %}Change Password - Face Attendance{% endblock %}
{% block content %}
<section class="card" style="max-width:420px;">
  <h2>Change Password</h2>
  {% if error %}<div class="alert error">⚠️ {{ error }}</div>{% endif %}
  {% if success %}<div class="alert success">✅ {{ success }}</div>{% endif %}
  <form method="post">
    <div class="field"><label>Current Password</label><input name="current_password" type="password" required></div>
    <div class="field"><label>New Password</label><input name="new_password" type="password" required></div>
    <div class="field"><label>Confirm New Password</label><input name="confirm_password" type="password" required></div>
    <div class="controls"><button type="submit">Change Password</button></div>
  </form>
</section>
{% endblock %}
