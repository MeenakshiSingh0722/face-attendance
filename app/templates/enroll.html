{% extends "base.html" %}
{% block title %}Enroll - Face Attendance{% endblock %}
{% block content %}
<section class="card">
  <h2>Enroll Student</h2>
  <p class="subtitle">Fill in details, start the camera, capture 5-10 samples, then save.</p>
  <form id="enroll-form">
    <div class="grid">
      <label>Name <input type="text" name="name" required></label>
      <label>Roll No. <input type="text" name="roll" required></label>
      <label>Class/Section <input type="text" name="class_section" required></label>
      <label>Email (optional, for low-attendance alerts) <input type="text" name="email" placeholder="student@example.com"></label>
    </div>
    <div class="controls">
      <button type="button" id="startCam" class="secondary">🎥 Start Camera</button>
      <button type="button" id="capture" class="secondary">📸 Capture Sample</button>
      <button type="submit">💾 Save Enrollment</button>
    </div>
  </form>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" style="display:none;"></canvas>
  <div id="samples"></div>
  <div id="msg"></div>
</section>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const samples = document.getElementById('samples');
const msg = document.getElementById('msg');
let stream = null;
let blobs = [];

document.getElementById('startCam').onclick = async () => {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    video.srcObject = stream;
    msg.innerHTML = '';
  } catch (err) {
    msg.innerHTML = '<div class="alert error">⚠️ Could not access camera: ' + err.message + '</div>';
  }
};

document.getElementById('capture').onclick = () => {
  if (!stream) {
    msg.innerHTML = '<div class="alert warning">⚠️ Start the camera first.</div>';
    return;
  }
  const w = 480, h = 360;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, w, h);
  canvas.toBlob((blob) => {
    blobs.push(blob);
    const img = document.createElement('img');
    img.src = URL.createObjectURL(blob);
    img.className = 'thumb';
    samples.appendChild(img);
    msg.innerHTML = `<div class="alert success">✅ ${blobs.length} sample(s) captured. Capture at least 3.</div>`;
  }, 'image/jpeg', 0.9);
};

document.getElementById('enroll-form').onsubmit = async (e) => {
  e.preventDefault();
  const form = e.target;
  const fd = new FormData(form);
  if (blobs.length < 3) {
    msg.innerHTML = '<div class="alert warning">⚠️ Please capture at least 3 samples.</div>';
    return;
  }
  const submitBtn = form.querySelector('button[type="submit"]');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Saving...';
  blobs.forEach((b) => fd.append('images', b, 'sample.jpg'));
  try {
    const res = await fetch('/api/enroll', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.ok) {
      msg.innerHTML = `<div class="alert success">✅ Enrolled successfully! Student ID: ${data.student_id}</div>`;
      blobs = [];
      samples.innerHTML = '';
      form.reset();
    } else {
      msg.innerHTML = `<div class="alert error">❌ ${data.error || 'Unknown error'}</div>`;
    }
  } catch (err) {
    msg.innerHTML = `<div class="alert error">❌ Network error: ${err.message}</div>`;
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = '💾 Save Enrollment';
  }
};
</script>
{% endblock %}
